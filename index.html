<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #0b0b0c; --card-bg: #1e1e1f; --text-main: #ffffff; --text-muted: #8e9196; --up-color: #1a7f37; --down-color: #c93e36; --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .top-bar { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        h1 { margin: 0; font-size: 2rem; }
        
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a1b; color: #fff; font-size: 1rem; width: 250px; }
        .search-box button { padding: 10px 20px; border-radius: 8px; border: none; background: #1a7f37; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid #333336; padding-bottom: 10px; width: 100%; max-width: 1400px; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; font-weight: 600; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { color: #fff; background-color: #333336; border-bottom: 3px solid #1a7f37; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1400px; }
        .section-title { width: 100%; max-width: 1400px; font-size: 1.5rem; color: var(--text-muted); margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333336; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .asset-name { font-size: 1.2rem; font-weight: 700; }
        .asset-ticker { font-size: 0.8rem; color: var(--text-muted); }
        .price { font-size: 1.6rem; font-weight: 800; margin: 0; text-align: right; }
        .variation { font-size: 0.9rem; font-weight: 600; text-align: right; }
        .up { color: var(--up-color); } .down { color: var(--down-color); }
        .mini-chart { width: 100%; height: 80px; margin-top: 10px; position: relative; }
        
        /* Ajuste crucial para os gráficos nativos renderizarem corretamente */
        .mini-chart canvas { width: 100%; height: 100%; display: block; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px 0; }
        .modal-content { background-color: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 900px; border: 1px solid #333336; margin: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 1.5rem; color: var(--text-muted); cursor: pointer; border: none; background: none; }
        .timeframe-buttons { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333336; padding-bottom: 10px; }
        .time-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 5px 10px; border-radius: 4px; }
        .time-btn.active { color: #fff; background-color: #333336; }
        .detailed-chart { width: 100%; height: 350px; margin-bottom: 20px;}

        .ind-category { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .ind-category-title { font-size: 1rem; font-weight: 700; color: #d67a36; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
        .indicadores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 20px; }
        .ind-box { display: flex; flex-direction: column; }
        .ind-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;}
        .ind-value { font-size: 1.3rem; font-weight: bold; color: #fff; margin-top: 4px;}
        .loading-ind { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }

        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; white-space: nowrap; }
        .ranking-table th { background-color: #1a1a1b; color: #d67a36; padding: 12px 15px; text-align: left; border-bottom: 2px solid #333; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; transition: 0.2s;}
        .ranking-table th:hover { background-color: #333; color: #fff; }
        .ranking-table td { padding: 12px 15px; border-bottom: 1px solid #333336; color: #fff; }
        .ranking-table tr:hover { background-color: #2a2a2c; }
        
        .status-badge { padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .status-sub { background-color: rgba(76, 175, 80, 0.15); color: #4CAF50; border: 1px solid #4CAF50; }
        .status-justo { background-color: rgba(255, 193, 7, 0.15); color: #FFC107; border: 1px solid #FFC107; }
        .status-super { background-color: rgba(244, 67, 54, 0.15); color: #F44336; border: 1px solid #F44336; }
        .margem-positiva { color: #4CAF50; font-weight: bold; }
        .margem-negativa { color: #c93e36; font-weight: bold; }

        .btn-ia-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-ia { padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; border: none; color: #fff; width: 100%; max-width: 320px;}
        .btn-ia:disabled { background: #333 !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }
        .btn-ia:hover { transform: translateY(-2px); }
        .btn-tech { background: linear-gradient(45deg, #9C27B0, #3f51b5); box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3); }
        .btn-tech:hover { box-shadow: 0 6px 20px rgba(156, 39, 176, 0.5); }
        .btn-ri { background: linear-gradient(45deg, #0288D1, #009688); box-shadow: 0 4px 15px rgba(2, 136, 209, 0.3); }
        .btn-ri:hover { box-shadow: 0 6px 20px rgba(2, 136, 209, 0.5); }

        .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .tech-box { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; }
        .tech-label { font-size: 0.8rem; color: #8e9196; text-transform: uppercase; letter-spacing: 1px; }
        .tech-val { font-size: 1.2rem; font-weight: bold; margin-top: 5px; color: #fff; }
        
        .alert-error { background: rgba(244, 67, 54, 0.1); border: 1px solid #F44336; color: #F44336; padding: 15px; border-radius: 8px; text-align: center; margin-top: 15px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Terminal Financeiro Pro</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar ativo" onkeypress="if(event.key === 'Enter') searchAsset()">
            <button onclick="searchAsset()">Buscar</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('geral', this)">Visão Geral</button>
        <button class="tab-btn" onclick="switchTab('destaques', this)">🔥 Altas e Baixas</button>
        <button class="tab-btn" onclick="switchTab('brasil', this)">Ações Brasil</button>
        <button class="tab-btn" onclick="switchTab('intl', this)">Ações Internacionais</button>
        <button class="tab-btn" onclick="switchTab('ranking', this)">🏆 Ranking IA</button>
        <button class="tab-btn" onclick="switchTab('oportunidades', this)">🎯 Oportunidades</button>
    </div>

    <div class="dashboard" id="dashboard"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Detalhes do Ativo</h2>
                <button class="close-btn" onclick="closeModal()">✖</button>
            </div>
            
            <div class="timeframe-buttons">
                <button class="time-btn" onclick="loadDetailedData('1mo', '1d', this)">1 M</button>
                <button class="time-btn" onclick="loadDetailedData('6mo', '1d', this)">6 M</button>
                <button class="time-btn active" onclick="loadDetailedData('1y', '1d', this)">1 A</button>
                <button class="time-btn" onclick="loadDetailedData('5y', '1wk', this)">5 A</button>
            </div>
            
            <div class="detailed-chart"><canvas id="modalChartCanvas"></canvas></div>

            <div style="background: #1a1a1b; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 30px;">
                <div class="btn-ia-container">
                    <button id="btn-ia-tech" class="btn-ia btn-tech" onclick="chamarAnaliseTecnica()">🎯 Análise Gráfica (IA)</button>
                    <button id="btn-ia-ri" class="btn-ia btn-ri" onclick="chamarAnaliseRI()">📰 Radar Corporativo & RI (IA)</button>
                </div>
                <div id="tech-result" style="display: none; text-align: left; margin-bottom: 20px;"></div>
                <div id="ri-result" style="display: none; text-align: left;"></div>
            </div>

            <div id="indicadores-container"></div>
        </div>
    </div>

    <script>
        const URL_BACKEND = 'https://api-financeira-8yu7.onrender.com';

        const ativosGerais = [{ id: 'USD', name: 'Dólar', ticker: 'BRL=X', decimals: 3, prefix: 'R$' },{ id: 'EUR', name: 'Euro', ticker: 'EURBRL=X', decimals: 3, prefix: 'R$' },{ id: 'BTC', name: 'Bitcoin', ticker: 'BTC-USD', decimals: 2, prefix: 'US$' },{ id: 'XAU', name: 'Ouro', ticker: 'GC=F', decimals: 2, prefix: 'US$' },{ id: 'OIL', name: 'Petróleo', ticker: 'BZ=F', decimals: 2, prefix: 'US$' }];
        const listaBrasilRaw = ['AGRO3', 'AMOB3', 'BBAS3', 'BBDC3', 'BBSE3', 'BRSR6', 'B3SA3', 'CMIG3', 'CXSE3', 'EGIE3', 'EQTL3', 'ETHE11', 'EZTC3', 'FLRY3', 'GMAT3', 'GOLD11', 'ITSA4', 'KEPL3', 'KLBN3', 'LEVE3', 'MBRF3', 'PETR3', 'PRIO3', 'PSSA3', 'QBTC11', 'QSOL11', 'RAIZ4', 'RANI3', 'SAPR4', 'SBFG3', 'SMTO3', 'SOJA3', 'SUZB3', 'TAEE11', 'TTEN3', 'VAMO3', 'VIVT3', 'WEGE3'];
        const ativosBrasil = listaBrasilRaw.map(ticker => ({ id: ticker, name: ticker, ticker: `${ticker}.SA`, decimals: 2, prefix: 'R$' }));
        const listaIntlRaw = ['GOOGL', 'AMZN', 'NVDA', 'TSM', 'ASML', 'AVGO', 'IRS', 'TSLA', 'MU', 'VZ', 'T', 'HD', 'SHOP', 'DIS', 'SPG', 'ANET', 'ICE', 'KO', 'EQNR', 'EPR', 'WFC', 'VICI', 'O', 'CPRT', 'ASX', 'CEPU', 'NVO', 'PLTR', 'JBL', 'QCOM', 'AAPL', 'MSFT', 'BAC', 'ORCL', 'EQT', 'MNST', 'CVS', 'HUYA', 'GPC', 'PFE', 'ROKU', 'DIBS', 'LEG', 'MBUU', 'FVRR'];
        const ativosIntl = listaIntlRaw.map(ticker => ({ id: ticker, name: ticker, ticker: ticker, decimals: 2, prefix: 'US$' }));

        const categorias = { geral: ativosGerais, brasil: ativosBrasil, intl: ativosIntl };
        
        let currentTab = 'geral'; 
        let detailedChartInstance = null; 
        let currentAssetObj = null; 
        
        let dadosRankingBr = []; 
        let dadosRankingUs = []; 
        let ordemRanking = { br: { col: 'roe', dir: -1 }, us: { col: 'roe', dir: -1 } };

        // ==========================================
        // CONSTRUTOR DE CARTÕES
        // ==========================================
        function buildCards(ativos, container) {
            // Usa fragmento para injetar todos os cartões na tela numa tacada só
            const fragment = document.createDocumentFragment();
            
            ativos.forEach(asset => {
                const card = document.createElement('div'); 
                card.className = 'card'; 
                card.onclick = () => openModal(asset);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="asset-name">${asset.name}</div>
                            <div class="asset-ticker">${asset.ticker}</div>
                        </div>
                        <div>
                            <div class="price" id="price-${asset.id}">---</div>
                            <div class="variation" id="var-${asset.id}">--</div>
                        </div>
                    </div>
                    <div class="mini-chart"><canvas id="mini-chart-${asset.id}"></canvas></div>
                `;
                fragment.appendChild(card);
            });
            container.appendChild(fragment);
        }

        // ==========================================
        // GERENCIADOR DE ABAS (ULTRA RÁPIDO)
        // ==========================================
        async function switchTab(tabName, btnElement) {
            try {
                // Atualiza UI dos botões
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
                if(btnElement) btnElement.classList.add('active');
                
                currentTab = tabName; 
                const db = document.getElementById('dashboard'); 
                db.innerHTML = ''; // Limpa a tela instantaneamente

                if (['ranking', 'destaques', 'oportunidades'].includes(tabName)) {
                    db.style.display = 'block'; 
                } else {
                    db.style.display = 'grid';
                }

                // -----------------------------
                // ABA OPORTUNIDADES
                // -----------------------------
                if(tabName === 'oportunidades') {
                    db.innerHTML = '<div class="section-title">Calculando... ⏳</div>';
                    const r = await fetch('./indicadores.json?nocache=' + Date.now()); 
                    const dBase = await r.json();
                    let bBr = []; let bUs = [];
                    
                    for(const t in dBase) {
                        const p = dBase[t].precoAtual; 
                        const pp = dBase[t].valuation_dcf?.cenarios?.pessimista?.preco_justo;
                        if(p && pp && p > 0) {
                            const m = (pp - p) / p; 
                            const isBr = t.includes('.SA');
                            const it = { ticker: t, status: dBase[t].valuation_dcf?.status || 'N/A', precoAtual: p, precoPessimista: pp, margem: m, prefix: isBr ? 'R$' : 'US$' };
                            isBr ? bBr.push(it) : bUs.push(it);
                        }
                    }
                    
                    bBr.sort((a,b) => b.margem - a.margem); bUs.sort((a,b) => b.margem - a.margem);
                    const fn = n => parseFloat(n).toFixed(2); const fp = n => (parseFloat(n) * 100).toFixed(2) + '%';
                    
                    const rt = (tit, l) => {
                        if(!l.length) return '';
                        let h = `
                            <div class="section-title">${tit}</div>
                            <div style="width: 100%; max-width: 1400px; overflow-x: auto; background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 40px;">
                            <table class="ranking-table">
                                <thead><tr><th>Ativo</th><th>Status IA</th><th>Preço</th><th>Alvo IA</th><th style="color: #4CAF50;">Margem</th></tr></thead>
                                <tbody>
                        `;
                        l.forEach(i => {
                            let bc = 'status-badge ' + (i.status === 'SUBVALORIZADA' ? 'status-sub' : i.status === 'SUPERVALORIZADA' ? 'status-super' : 'status-justo');
                            let mc = i.margem >= 0 ? 'margem-positiva' : 'margem-negativa'; let sm = i.margem > 0 ? '+' : '';
                            h += `<tr style="cursor:pointer;" onclick="abrirDoRanking('${i.ticker}')"><td style="font-weight: 800; color: #2196F3;">${i.ticker}</td><td><span class="${bc}">${i.status}</span></td><td>${i.prefix} ${fn(i.precoAtual)}</td><td>${i.prefix} ${fn(i.precoPessimista)}</td><td class="${mc}">${sm}${fp(i.margem)}</td></tr>`;
                        }); 
                        return h + '</tbody></table></div>';
                    };
                    
                    db.innerHTML = rt('🇧🇷 Brasil', bBr) + rt('🇺🇸 Internacional', bUs) || '<div class="section-title">Sem dados.</div>'; 
                    return;
                }

                // -----------------------------
                // ABA RANKING
                // -----------------------------
                if(tabName === 'ranking') {
                    db.innerHTML = '<div class="section-title">Analisando... ⏳</div>';
                    const r = await fetch('./indicadores.json?nocache=' + Date.now()); 
                    const dBase = await r.json();
                    dadosRankingBr = []; dadosRankingUs = [];
                    
                    for(const t in dBase) {
                        const d = dBase[t];
                        if(d.roe != null) {
                            const i = {
                                ticker: t, status: d.valuation_dcf?.status || 'N/A', 
                                dy: d.dy, pl: d.pl, pegRatio: d.pegRatio, pvp: d.pvp, 
                                evEbitda: d.evEbitda, vpa: d.vpa, dividaPL: d.dividaPL ? d.dividaPL / 100 : null, 
                                liquidezCorrente: d.liquidezCorrente, margem: d.margemLiquida, roe: d.roe
                            };
                            t.includes('.SA') ? dadosRankingBr.push(i) : dadosRankingUs.push(i);
                        }
                    }
                    
                    ordenarDados('br', 'roe', true); ordenarDados('us', 'roe', true); renderizarAbaRanking(); 
                    return;
                }

                // -----------------------------
                // ABA DESTAQUES
                // -----------------------------
                if(tabName === 'destaques') {
                    db.innerHTML = '<div class="section-title">Buscando cotações no mercado... ⏳</div>';
                    const todosAtivos = [...ativosBrasil, ...ativosIntl];
                    const ts = todosAtivos.map(a => a.ticker).join(',');
                    
                    try {
                        const r = await fetch(`${URL_BACKEND}/api/cotacoes-lote?tickers=${ts}`); 
                        const c = await r.json();
                        
                        let ativosComVariacao = todosAtivos.map(asset => { 
                            const d = c[asset.ticker]; 
                            if(!d || !d.fechamentoAnterior) return null; 
                            return { ...asset, varPct: ((d.atual - d.fechamentoAnterior) / d.fechamentoAnterior) * 100, atual: d.atual, anterior: d.fechamentoAnterior }; 
                        }).filter(a => a !== null);
                        
                        if(ativosComVariacao.length === 0) { 
                            db.innerHTML = `
                                <div class="card" style="grid-column: 1 / -1; border-color: #c93e36; background: rgba(201, 62, 54, 0.05); margin-top: 20px;">
                                    <div style="color: #c93e36; font-size: 1.2rem; font-weight: bold; text-align: center;">⚠️ Yahoo Temporariamente Indisponível</div>
                                    <div style="color: #8e9196; text-align: center; margin-top: 10px; line-height: 1.5;">O sistema do Yahoo limitou nossos acessos. Aguarde alguns minutos e tente recarregar.</div>
                                </div>`;
                            return; 
                        }
                        
                        ativosComVariacao.sort((a,b) => b.varPct - a.varPct); 
                        const ma = ativosComVariacao.slice(0,5); 
                        const mb = ativosComVariacao.slice(-5).reverse();
                        
                        db.innerHTML = `
                            <div class="section-title">Maiores Altas 🚀</div>
                            <div id="ga" class="dashboard" style="margin-bottom:20px;"></div>
                            <div class="section-title">Maiores Baixas 🔻</div>
                            <div id="gb" class="dashboard"></div>
                        `;
                        
                        buildCards(ma, document.getElementById('ga')); 
                        buildCards(mb, document.getElementById('gb'));
                        
                        [...ma,...mb].forEach(a => {
                            updateCardUI(a.id, a.atual, a.anterior, a.prefix, a.decimals);
                            fetchMiniChart(a.ticker, a.id, 'destaques');
                        });
                        
                    } catch(e) { 
                        db.innerHTML='<div class="section-title">Erro ao conectar com o Servidor.</div>'; 
                    }
                    return;
                }

                // -----------------------------
                // ABAS NORMAIS (Geral, Brasil, Intl)
                // -----------------------------
                const at = categorias[tabName]; 
                
                // 1. Desenha as caixas vazias IMEDIATAMENTE
                buildCards(at, db);
                
                // 2. Dispara a busca em lote dos preços
                const ts = at.map(a => a.ticker).join(',');
                fetch(`${URL_BACKEND}/api/cotacoes-lote?tickers=${ts}`)
                    .then(r => r.json())
                    .then(c => {
                        at.forEach(a => { 
                            if(c[a.ticker]) {
                                updateCardUI(a.id, c[a.ticker].atual, c[a.ticker].fechamentoAnterior, a.prefix, a.decimals); 
                            }
                        });
                    }).catch(() => {});
                
                // 3. Busca e desenha os mini-gráficos assincronamente (sem travar)
                at.forEach(asset => {
                    fetchMiniChart(asset.ticker, asset.id, tabName);
                });

            } catch (err) { 
                console.error("Erro interno no switchTab", err); 
            }
        }

        // ==========================================
        // MOTOR GRÁFICO NATIVO (ULTRA VELOZ)
        // Substitui o Chart.js pesadão por matemática pura
        // ==========================================
        async function fetchMiniChart(ticker, id, tabExpected) {
            try {
                const res = await fetch(`${URL_BACKEND}/api/historico/${ticker}?range=1mo&interval=1d`);
                const data = await res.json();
                
                if (data.historico && currentTab === tabExpected) {
                    drawNativeSparkline(id, data.historico);
                }
            } catch (e) {
                // Silencioso
            }
        }

        function drawNativeSparkline(id, hData) {
            const canvas = document.getElementById(`mini-chart-${id}`);
            if (!canvas || !hData || hData.length === 0) return;
            
            const ctx = canvas.getContext('2d');
            
            // Define o tamanho real em pixels da área de desenho
            const width = canvas.width = canvas.parentElement.clientWidth || 240;
            const height = canvas.height = 80;

            const prices = hData.map(d => d.close);
            const min = Math.min(...prices);
            const max = Math.max(...prices);
            const range = max - min === 0 ? 1 : max - min; // Evita divisão por zero

            const isUp = prices[prices.length - 1] >= prices[0];
            const color = isUp ? '#1a7f37' : '#c93e36';

            // Limpa o frame
            ctx.clearRect(0, 0, width, height);
            
            const stepX = width / (prices.length - 1 || 1);
            const paddingY = 10; // Deixa um respiro em cima e embaixo
            const heightUtil = height - (paddingY * 2);

            // 1. Pinta o Fundo (Gradiente)
            ctx.beginPath();
            ctx.moveTo(0, height); // Começa na ponta inferior esquerda
            
            for (let i = 0; i < prices.length; i++) {
                const x = i * stepX;
                const y = paddingY + heightUtil * (1 - (prices[i] - min) / range);
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(width, height); // Desce pra ponta inferior direita
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, isUp ? 'rgba(26, 127, 55, 0.4)' : 'rgba(201, 62, 54, 0.4)');
            gradient.addColorStop(1, 'rgba(11, 11, 12, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();

            // 2. Desenha a Linha do Gráfico
            ctx.beginPath();
            for (let i = 0; i < prices.length; i++) {
                const x = i * stepX;
                const y = paddingY + heightUtil * (1 - (prices[i] - min) / range);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function ordenarDados(t, c, i) { 
            let e = ordemRanking[t]; 
            if (!i) { 
                if (e.col === c) e.dir *= -1; 
                else { 
                    e.col = c; 
                    e.dir = ['pl', 'pegRatio', 'pvp', 'evEbitda', 'dividaPL'].includes(c) ? 1 : -1; 
                } 
            } 
            let l = t === 'br' ? dadosRankingBr : dadosRankingUs; 
            l.sort((a,b) => { 
                if(a[c] == null) return 1; 
                if(b[c] == null) return -1; 
                return a[c] < b[c] ? -1 * e.dir : a[c] > b[c] ? 1 * e.dir : 0; 
            }); 
        }

        function drawDetailedChart(h) { 
            if(!h || !h.length) return; 
            const ctx = document.getElementById('modalChartCanvas').getContext('2d'); 
            const c = (h[h.length - 1].close - h[0].close) >= 0 ? '#1a7f37' : '#c93e36'; 
            
            if(detailedChartInstance) detailedChartInstance.destroy(); 
            
            const g = ctx.createLinearGradient(0, 0, 0, 400); 
            g.addColorStop(0, c); 
            g.addColorStop(1, '#0b0b0c'); 
            
            detailedChartInstance = new Chart(ctx, { 
                type: 'line', 
                data: { labels: h.map(i => i.time), datasets: [{ data: h.map(i => i.close), borderColor: c, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: g }] }, 
                options: { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: 'index' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1b', titleColor: '#fff', bodyColor: '#fff', borderColor: '#444', borderWidth: 1 } }, scales: { x: { display: false }, y: { display: true, position: 'left', ticks: { color: '#8e9196', callback: v => currentAssetObj.prefix + ' ' + v.toLocaleString() }, grid: { color: '#333336' } } } } 
            }); 
        }

        // Start Inicial
        window.addEventListener('DOMContentLoaded', () => { switchTab('geral', document.querySelector('.tab-btn')); });
    </script>
</body>
