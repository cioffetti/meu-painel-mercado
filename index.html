<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0b0c; /* Mais escuro, como no exemplo */
            --card-bg: #1e1e1f;
            --text-main: #ffffff;
            --text-muted: #8e9196;
            --up-color: #1a7f37; /* Verde mais sóbrio */
            --down-color: #c93e36; /* Vermelho mais sóbrio */
            --neutral-color: #9e9e9e;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 30px; font-size: 2rem; text-align: center; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); /* Cartões maiores para o gráfico */
            gap: 25px;
            width: 100%;
            max-width: 1400px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #333336;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .asset-name-block { display: flex; flex-direction: column; gap: 2px; }
        .asset-name { font-size: 1.4rem; font-weight: 700; }
        .asset-ticker { font-size: 0.9rem; color: var(--text-muted); padding: 2px 0px; }
        
        .price-summary { text-align: right; display: flex; flex-direction: column; gap: 5px; }
        .price { font-size: 2.2rem; font-weight: 800; margin: 0; }
        .variation { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 5px; justify-content: flex-end; }

        .up { color: var(--up-color); }
        .down { color: var(--down-color); }
        .neutral { color: var(--neutral-color); }

        /* Contêiner principal para o gráfico de 30 dias */
        .main-chart-container {
            width: 100%;
            height: 250px; /* Gráfico maior */
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Visão Geral de Mercado Pro</h1>

    <div class="dashboard" id="dashboard">
        </div>

    <script>
        const assets = [
            { id: 'USD', name: 'Dólar', ticker: 'BRL=X', decimals: 3 },
            { id: 'EUR', name: 'Euro', ticker: 'EURBRL=X', decimals: 3 },
            { id: 'BTC', name: 'Bitcoin', ticker: 'BTC-USD', decimals: 2, prefix: 'US$' },
            { id: 'XAU', name: 'Ouro', ticker: 'GC=F', decimals: 2, prefix: 'US$' },
            { id: 'OIL', name: 'Petróleo', ticker: 'BZ=F', decimals: 2, prefix: 'US$' }
        ];

        const dashboard = document.getElementById('dashboard');

        // Renderiza o esqueleto dos cartões com o espaço do gráfico maior
        function renderCards() {
            assets.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="asset-name-block">
                            <span class="asset-name">${asset.name}</span>
                            <span class="asset-ticker">${asset.ticker}</span>
                        </div>
                        <div class="price-summary">
                            <div class="price" id="price-${asset.id}">---</div>
                            <div class="variation" id="var-${asset.id}">--</div>
                        </div>
                    </div>
                    <div class="main-chart-container">
                        <canvas id="main-chart-${asset.id}"></canvas>
                    </div>
                `;
                dashboard.appendChild(card);
            });
        }

        // Função para desenhar o gráfico de área de 30 dias (Estilo do exemplo)
        function drawMainChart(id, historicalData, assetDetails) {
            const canvasEl = document.getElementById(`main-chart-${id}`);
            const ctx = canvasEl.getContext('2d');
            
            // Calculando a variação dos 30 dias: Hoje vs 30 dias atrás
            const currentPrice = historicalData[historicalData.length - 1].preco;
            const startPrice = historicalData[0].preco;
            const variation30d = currentPrice - startPrice;
            const isUp30d = variation30d >= 0;

            // Cores baseadas na variação de 30 dias, como no exemplo
            const color = isUp30d ? '#1a7f37' : '#c93e36'; // Verde sóbrio / Vermelho sóbrio
            
            // Preparando dados para Chart.js
            const labels = historicalData.map(item => item.data);
            const prices = historicalData.map(item => item.preco);

            // Gradiente para o preenchimento da área
            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, color); // Cor sólida no topo
            gradient.addColorStop(1, '#0b0b0c'); // Fundo escuro na base

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Preço 30 Dias (${assetDetails.name})`,
                        data: prices,
                        borderColor: color, // Cor da linha
                        borderWidth: 2,
                        tension: 0.1, // Linhas mais retas e financeiras
                        pointRadius: 0, // Sem bolinhas
                        fill: true, // Preenche a área
                        backgroundColor: gradient // Gradiente para o preenchimento, como no exemplo
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }, // Sem legenda superior
                        tooltip: {
                            backgroundColor: '#1e1e1f',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: '#333336',
                            borderWidth: 1,
                            displayColors: false,
                            callbacks: {
                                label: (context) => {
                                    return `${assetDetails.prefix || 'R$'} ${parseFloat(context.raw).toFixed(assetDetails.decimals)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { display: false }, // Esconde eixo X, rótulos de data
                        y: { 
                            display: true, 
                            ticks: { display: false }, // Esconde rótulos de preço
                            grid: { display: false } // Sem linhas de grade, visual limpo como no exemplo
                        }
                    }
                }
            });
        }

        function updateCardUI(id, currentPrice, previousPrice, prefix = 'R$', decimals = 2) {
            const priceEl = document.getElementById(`price-${id}`);
            const varEl = document.getElementById(`var-${id}`);
            
            const variationValue = currentPrice - previousPrice;
            const variationPct = (variationValue / previousPrice) * 100;

            priceEl.innerHTML = `${prefix} ${currentPrice.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}`;

            if (variationValue > 0) {
                varEl.innerHTML = `▲ +${variationPct.toFixed(2)}%`;
                varEl.className = 'variation up';
            } else if (variationValue < 0) {
                varEl.innerHTML = `▼ ${variationPct.toFixed(2)}%`;
                varEl.className = 'variation down';
            } else {
                varEl.innerHTML = `▬ 0.00%`;
                varEl.className = 'variation neutral';
            }
        }

        // Função para buscar e desenhar o histórico de 30 dias
        async function fetchHistoricalData(id, ticker, assetDetails) {
            try {
                // ATENÇÃO: Confirme se este é o seu link correto do Render
                const response = await fetch(`https://api-financeira-8yu7.onrender.com/api/historico/${ticker}`);
                const data = await response.json();
                
                if (data.historico) {
                    drawMainChart(id, data.historico, assetDetails);
                }

            } catch (error) { console.error(`Erro ao buscar histórico de ${ticker}:`, error); }
        }

        // Função principal que orquestra tudo
        async function fetchBackendData() {
            try {
                // Busca os preços atuais
                const responseCurrent = await fetch('https://api-financeira-8yu7.onrender.com/api/commodities');
                const currentData = await responseCurrent.json();

                // Atualiza o resumo de preço no topo dos cartões
                updateCardUI('USD', currentData.dolar.atual, currentData.dolar.fechamentoAnterior, 'R$', 3);
                updateCardUI('EUR', currentData.euro.atual, currentData.euro.fechamentoAnterior, 'R$', 3);
                updateCardUI('BTC', currentData.bitcoin.atual, currentData.bitcoin.fechamentoAnterior, 'US$', 2);
                updateCardUI('XAU', currentData.ouro.atual, currentData.ouro.fechamentoAnterior, 'US$', 2);
                updateCardUI('OIL', currentData.petroleo.atual, currentData.petroleo.fechamentoAnterior, 'US$', 2);

                // Orquestra a busca e o desenho dos 5 gráficos de 30 dias
                fetchHistoricalData('USD', 'BRL=X', { name: 'Dólar', prefix: 'R$', decimals: 3 });
                fetchHistoricalData('EUR', 'EURBRL=X', { name: 'Euro', prefix: 'R$', decimals: 3 });
                fetchHistoricalData('BTC', 'BTC-USD', { name: 'Bitcoin', prefix: 'US$', decimals: 2 });
                fetchHistoricalData('XAU', 'GC=F', { name: 'Ouro', prefix: 'US$', decimals: 2 });
                fetchHistoricalData('OIL', 'BZ=F', { name: 'Petróleo', prefix: 'US$', decimals: 2 });

            } catch (error) { console.error("Erro ao conectar com o backend:", error); }
        }

        function init() {
            renderCards();
            fetchBackendData(); // Chama tudo logo ao abrir o site

            // O ecrã atualiza os preços atuais a cada 30 segundos
            // O histórico de 30 dias só é buscado uma vez ao carregar a página
            setInterval(() => { fetchBackendData(); }, 30000);
        }

        init();
    </script>
</body>
</html>
