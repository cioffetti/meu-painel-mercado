<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Financeiro Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #0b0b0c; --card-bg: #1e1e1f; --text-main: #ffffff; --text-muted: #8e9196; --up-color: #1a7f37; --down-color: #c93e36; --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .top-bar { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;}
        h1 { margin: 0; font-size: 2rem; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { padding: 10px 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a1b; color: #fff; font-size: 1rem; width: 250px; }
        .search-box button { padding: 10px 20px; border-radius: 8px; border: none; background: #1a7f37; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid #333336; padding-bottom: 10px; width: 100%; max-width: 1400px; overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; font-weight: 600; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.2s; white-space: nowrap; }
        .tab-btn.active { color: #fff; background-color: #333336; border-bottom: 3px solid #1a7f37; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1400px; }
        .section-title { width: 100%; max-width: 1400px; font-size: 1.5rem; color: var(--text-muted); margin-top: 20px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;}
        
        .card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #333336; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .asset-name { font-size: 1.2rem; font-weight: 700; }
        .asset-ticker { font-size: 0.8rem; color: var(--text-muted); }
        .price { font-size: 1.6rem; font-weight: 800; margin: 0; text-align: right; }
        .variation { font-size: 0.9rem; font-weight: 600; text-align: right; }
        .up { color: var(--up-color); } .down { color: var(--down-color); }
        .mini-chart { width: 100%; height: 80px; margin-top: 10px; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px 0; }
        .modal-content { background-color: var(--card-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 900px; border: 1px solid #333336; margin: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { font-size: 1.5rem; color: var(--text-muted); cursor: pointer; border: none; background: none; }
        .timeframe-buttons { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333336; padding-bottom: 10px; }
        .time-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 5px 10px; border-radius: 4px; }
        .time-btn.active { color: #fff; background-color: #333336; }
        .detailed-chart { width: 100%; height: 350px; margin-bottom: 20px;}

        .ind-category { margin-top: 25px; border-top: 1px solid #333; padding-top: 15px; }
        .ind-category-title { font-size: 1rem; font-weight: 700; color: #d67a36; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
        .indicadores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 20px; }
        .ind-box { display: flex; flex-direction: column; }
        .ind-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;}
        .ind-value { font-size: 1.3rem; font-weight: bold; color: #fff; margin-top: 4px;}
        .loading-ind { color: var(--text-muted); font-size: 0.9rem; font-style: italic; }

        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; white-space: nowrap; }
        .ranking-table th { background-color: #1a1a1b; color: #d67a36; padding: 12px 15px; text-align: left; border-bottom: 2px solid #333; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; transition: 0.2s;}
        .ranking-table th:hover { background-color: #333; color: #fff; }
        .ranking-table td { padding: 12px 15px; border-bottom: 1px solid #333336; color: #fff; }
        .ranking-table tr:hover { background-color: #2a2a2c; }
        .status-badge { padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .status-sub { background-color: rgba(76, 175, 80, 0.15); color: #4CAF50; border: 1px solid #4CAF50; }
        .status-justo { background-color: rgba(255, 193, 7, 0.15); color: #FFC107; border: 1px solid #FFC107; }
        .status-super { background-color: rgba(244, 67, 54, 0.15); color: #F44336; border: 1px solid #F44336; }
        .margem-positiva { color: #4CAF50; font-weight: bold; }
        .margem-negativa { color: #c93e36; font-weight: bold; }

        .btn-ia-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-ia { padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; border: none; color: #fff; width: 100%; max-width: 320px;}
        .btn-ia:disabled { background: #333 !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }
        .btn-ia:hover { transform: translateY(-2px); }
        .btn-tech { background: linear-gradient(45deg, #9C27B0, #3f51b5); box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3); }
        .btn-tech:hover { box-shadow: 0 6px 20px rgba(156, 39, 176, 0.5); }

        .tech-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .tech-box { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; border-radius: 8px; text-align: center; }
        .tech-label { font-size: 0.8rem; color: #8e9196; text-transform: uppercase; letter-spacing: 1px; }
        .tech-val { font-size: 1.2rem; font-weight: bold; margin-top: 5px; color: #fff; }
        .alert-error { background: rgba(244, 67, 54, 0.1); border: 1px solid #F44336; color: #F44336; padding: 15px; border-radius: 8px; text-align: center; margin-top: 15px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Terminal Financeiro Pro</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar ativo (Ex: PETR4, AAPL)" onkeypress="if(event.key === 'Enter') searchAsset()">
            <button onclick="searchAsset()">Buscar</button>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('geral', this)">Visão Geral</button>
        <button class="tab-btn" onclick="switchTab('destaques', this)">🔥 Altas e Baixas</button>
        <button class="tab-btn" onclick="switchTab('brasil', this)">Ações Brasil</button>
        <button class="tab-btn" onclick="switchTab('intl', this)">Ações Internacionais</button>
        <button class="tab-btn" onclick="switchTab('ranking', this)">🏆 Ranking IA</button>
        <button class="tab-btn" onclick="switchTab('oportunidades', this)">🎯 Oportunidades</button>
    </div>

    <div class="dashboard" id="dashboard"></div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Detalhes do Ativo</h2>
                <button class="close-btn" onclick="closeModal()">✖</button>
            </div>
            
            <div class="timeframe-buttons">
                <button class="time-btn" onclick="loadDetailedData('1mo', '1d', this)">1 M</button>
                <button class="time-btn" onclick="loadDetailedData('6mo', '1d', this)">6 M</button>
                <button class="time-btn active" onclick="loadDetailedData('1y', '1d', this)">1 A</button>
                <button class="time-btn" onclick="loadDetailedData('5y', '1wk', this)">5 A</button>
            </div>
            
            <div class="detailed-chart"><canvas id="modalChartCanvas"></canvas></div>

            <div style="background: #1a1a1b; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 30px;">
                <div class="btn-ia-container">
                    <button id="btn-ia-tech" class="btn-ia btn-tech" onclick="chamarAnaliseTecnica()">🎯 Análise Gráfica (IA)</button>
                </div>
                <div id="tech-result" style="display: none; text-align: left;"></div>
            </div>

            <div id="indicadores-container">
                <div class="loading-ind">Carregando indicadores fundamentais...</div>
            </div>
        </div>
    </div>

    <script>
        const URL_BACKEND = 'https://api-financeira-8yu7.onrender.com';

        const ativosGerais = [
            { id: 'USD', name: 'Dólar', ticker: 'BRL=X', decimals: 3, prefix: 'R$' },
            { id: 'EUR', name: 'Euro', ticker: 'EURBRL=X', decimals: 3, prefix: 'R$' },
            { id: 'BTC', name: 'Bitcoin', ticker: 'BTC-USD', decimals: 2, prefix: 'US$' },
            { id: 'XAU', name: 'Ouro', ticker: 'GC=F', decimals: 2, prefix: 'US$' },
            { id: 'OIL', name: 'Petróleo', ticker: 'BZ=F', decimals: 2, prefix: 'US$' }
        ];

        const listaBrasilRaw = ['AGRO3', 'AMOB3', 'BBAS3', 'BBDC3', 'BBSE3', 'BRSR6', 'B3SA3', 'CMIG3', 'CXSE3', 'EGIE3', 'EQTL3', 'ETHE11', 'EZTC3', 'FLRY3', 'GMAT3', 'GOLD11', 'ITSA4', 'KEPL3', 'KLBN3', 'LEVE3', 'MBRF3', 'PETR3', 'PRIO3', 'PSSA3', 'QBTC11', 'QSOL11', 'RAIZ4', 'RANI3', 'SAPR4', 'SBFG3', 'SMTO3', 'SOJA3', 'SUZB3', 'TAEE11', 'TTEN3', 'VAMO3', 'VIVT3', 'WEGE3'];
        const ativosBrasil = listaBrasilRaw.map(ticker => ({ id: ticker, name: ticker, ticker: `${ticker}.SA`, decimals: 2, prefix: 'R$' }));

        const listaIntlRaw = ['GOOGL', 'AMZN', 'NVDA', 'TSM', 'ASML', 'AVGO', 'IRS', 'TSLA', 'MU', 'VZ', 'T', 'HD', 'SHOP', 'DIS', 'SPG', 'ANET', 'ICE', 'KO', 'EQNR', 'EPR', 'WFC', 'VICI', 'O', 'CPRT', 'ASX', 'CEPU', 'NVO', 'PLTR', 'JBL', 'QCOM', 'AAPL', 'MSFT', 'BAC', 'ORCL', 'EQT', 'MNST', 'CVS', 'HUYA', 'GPC', 'PFE', 'ROKU', 'DIBS', 'LEG', 'MBUU', 'FVRR'];
        const ativosIntl = listaIntlRaw.map(ticker => ({ id: ticker, name: ticker, ticker: ticker, decimals: 2, prefix: 'US$' }));

        const categorias = { geral: ativosGerais, brasil: ativosBrasil, intl: ativosIntl };
        let currentTab = 'geral';
        let miniCharts = {}; 
        let detailedChartInstance = null; 
        let currentAssetObj = null; 

        let dadosRankingBr = [];
        let dadosRankingUs = [];
        let ordemRanking = { br: { col: 'roe', dir: -1 }, us: { col: 'roe', dir: -1 } };

        // CONSTRUÇÃO IMEDIATA (Sem frescuras de fila ou observadores)
        function buildCards(ativos, container) {
            ativos.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(asset);
                card.innerHTML = `
                    <div class="card-header">
                        <div><div class="asset-name">${asset.name}</div><div class="asset-ticker">${asset.ticker}</div></div>
                        <div><div class="price" id="price-${asset.id}">---</div><div class="variation" id="var-${asset.id}">--</div></div>
                    </div>
                    <div class="mini-chart"><canvas id="mini-chart-${asset.id}"></canvas></div>
                `;
                container.appendChild(card);
            });
        }

        async function switchTab(tabName, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            currentTab = tabName;
            
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = ''; 
            Object.keys(miniCharts).forEach(id => { if(miniCharts[id]) miniCharts[id].destroy(); });
            miniCharts = {};

            if (tabName === 'ranking' || tabName === 'destaques' || tabName === 'oportunidades') {
                dashboard.style.display = 'block';
            } else {
                dashboard.style.display = 'grid';
            }

            if(tabName === 'oportunidades') {
                dashboard.innerHTML = '<div class="section-title">Calculando Margem de Segurança... ⏳</div>';
                try {
                    const res = await fetch('./indicadores.json?nocache=' + new Date().getTime());
                    if (!res.ok) throw new Error("Arquivo não encontrado");
                    const dadosDaBase = await res.json();
                    let listaOportunidadesBr = []; 
                    let listaOportunidadesUs = [];

                    for (const ticker in dadosDaBase) {
                        const d = dadosDaBase[ticker];
                        const precoAtual = d.precoAtual;
                        const precoPessimista = d.valuation_dcf?.cenarios?.pessimista?.preco_justo;
                        if(precoAtual && precoPessimista && precoAtual > 0) {
                            const margemSeguranca = (precoPessimista - precoAtual) / precoAtual;
                            const isBrasil = ticker.includes('.SA');
                            const prefix = isBrasil ? 'R$' : 'US$';
                            const item = { ticker: ticker, status: d.valuation_dcf?.status || 'N/A', precoAtual: precoAtual, precoPessimista: precoPessimista, margem: margemSeguranca, prefix: prefix };
                            if (isBrasil) listaOportunidadesBr.push(item); else listaOportunidadesUs.push(item);
                        }
                    }
                    listaOportunidadesBr.sort((a, b) => b.margem - a.margem); 
                    listaOportunidadesUs.sort((a, b) => b.margem - a.margem);
                    
                    const fNum = (num) => parseFloat(num).toFixed(2); 
                    const fPct = (num) => (parseFloat(num) * 100).toFixed(2) + '%';

                    const renderTabelaOportunidades = (titulo, lista) => {
                        if (lista.length === 0) return '';
                        let html = `<div class="section-title">${titulo}</div><div style="width: 100%; max-width: 1400px; overflow-x: auto; background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 40px;"><table class="ranking-table"><thead><tr><th>Ativo</th><th>Status IA</th><th>Preço Atual Tela</th><th>Alvo Pessimista IA</th><th style="color: #4CAF50;">Margem vs Pessimista (Upside)</th></tr></thead><tbody>`;
                        lista.forEach(item => {
                            let badgeClass = 'status-badge ' + (item.status === 'SUBVALORIZADA' ? 'status-sub' : item.status === 'SUPERVALORIZADA' ? 'status-super' : 'status-justo');
                            let margemClass = item.margem >= 0 ? 'margem-positiva' : 'margem-negativa'; 
                            let sinalMargem = item.margem > 0 ? '+' : '';
                            html += `<tr style="cursor:pointer;" onclick="abrirDoRanking('${item.ticker}')"><td style="font-weight: 800; color: #2196F3; font-size: 1.1rem;">${item.ticker}</td><td><span class="${badgeClass}">${item.status}</span></td><td>${item.prefix} ${fNum(item.precoAtual)}</td><td>${item.prefix} ${fNum(item.precoPessimista)}</td><td class="${margemClass}">${sinalMargem}${fPct(item.margem)}</td></tr>`;
                        });
                        html += `</tbody></table></div>`; return html;
                    };
                    let telaCompleta = '';
                    if (listaOportunidadesBr.length > 0) telaCompleta += renderTabelaOportunidades('🇧🇷 Radar de Oportunidades Brasil', listaOportunidadesBr);
                    if (listaOportunidadesUs.length > 0) telaCompleta += renderTabelaOportunidades('🇺🇸 Radar de Oportunidades Internacionais', listaOportunidadesUs);
                    dashboard.innerHTML = telaCompleta || '<div class="section-title">Nenhum dado de Valuation encontrado no banco.</div>';
                } catch(e) { dashboard.innerHTML = '<div class="section-title">Sem dados estáticos disponíveis.</div>'; }
                return;
            }

            if(tabName === 'ranking') {
                dashboard.innerHTML = '<div class="section-title">Analisando e ordenando dados fundamentalistas... ⏳</div>';
                try {
                    const res = await fetch('./indicadores.json?nocache=' + new Date().getTime());
                    if (!res.ok) throw new Error("Arquivo não encontrado");
                    const dadosDaBase = await res.json();
                    dadosRankingBr = []; dadosRankingUs = [];
                    for (const ticker in dadosDaBase) {
                        const d = dadosDaBase[ticker];
                        if(d.roe !== undefined && d.roe !== null) {
                            const item = { ticker: ticker, status: d.valuation_dcf?.status || 'N/A', dy: d.dy, pl: d.pl, pegRatio: d.pegRatio, pvp: d.pvp, evEbitda: d.evEbitda, vpa: d.vpa, dividaPL: d.dividaPL ? d.dividaPL / 100 : null, liquidezCorrente: d.liquidezCorrente, margem: d.margemLiquida, roe: d.roe };
                            if (ticker.includes('.SA')) dadosRankingBr.push(item); else dadosRankingUs.push(item);
                        }
                    }
                    ordenarDados('br', 'roe', true); 
                    ordenarDados('us', 'roe', true); 
                    renderizarAbaRanking();
                } catch(e) { dashboard.innerHTML = '<div class="section-title">Sem dados estáticos disponíveis.</div>'; }
                return;
            }

            if(tabName === 'destaques') {
                dashboard.innerHTML = '<div class="section-title">Analisando 80+ ativos do mercado... ⏳</div>';
                const todosAtivos = [...ativosBrasil, ...ativosIntl];
                const tickersString = todosAtivos.map(a => a.ticker).join(',');
                try {
                    const res = await fetch(`${URL_BACKEND}/api/cotacoes-lote?tickers=${tickersString}`);
                    const cotacoes = await res.json();
                    let ativosComVariacao = todosAtivos.map(asset => {
                        const dados = cotacoes[asset.ticker];
                        if(!dados || !dados.fechamentoAnterior) return null;
                        const varPct = ((dados.atual - dados.fechamentoAnterior) / dados.fechamentoAnterior) * 100;
                        return { ...asset, varPct, atual: dados.atual, anterior: dados.fechamentoAnterior };
                    }).filter(a => a !== null);

                    if (ativosComVariacao.length === 0) { dashboard.innerHTML = '<div class="section-title">Aguardando dados (429 do Yahoo ativado)...</div>'; return; }
                    ativosComVariacao.sort((a, b) => b.varPct - a.varPct); 
                    const maioresAltas = ativosComVariacao.slice(0, 5); 
                    const maioresBaixas = ativosComVariacao.slice(-5).reverse();

                    dashboard.innerHTML = '<div class="section-title">Maiores Altas 🚀</div>';
                    const gridAltas = document.createElement('div'); gridAltas.className = 'dashboard'; gridAltas.style.display = 'grid';
                    buildCards(maioresAltas, gridAltas); dashboard.appendChild(gridAltas);
                    
                    dashboard.innerHTML += '<div class="section-title">Maiores Baixas 🔻</div>';
                    const gridBaixas = document.createElement('div'); gridBaixas.className = 'dashboard'; gridBaixas.style.display = 'grid';
                    buildCards(maioresBaixas, gridBaixas); dashboard.appendChild(gridBaixas);

                    // Atualiza Textos
                    [...maioresAltas, ...maioresBaixas].forEach(a => updateCardUI(a.id, a.atual, a.anterior, a.prefix, a.decimals));
                    
                    // Desenha Gráficos
                    setTimeout(async () => {
                        for(let i=0; i<maioresAltas.length; i++) { if(currentTab!=='destaques') break; await fetchMiniChart(maioresAltas[i], 'destaques'); await new Promise(r=>setTimeout(r, 50)); }
                        for(let i=0; i<maioresBaixas.length; i++) { if(currentTab!=='destaques') break; await fetchMiniChart(maioresBaixas[i], 'destaques'); await new Promise(r=>setTimeout(r, 50)); }
                    }, 50);

                } catch (e) { dashboard.innerHTML = '<div class="section-title">Erro ao carregar dados.</div>'; }
                return;
            }

            // ABAS NORMAIS (O DESENHO INSTANTÂNEO ACONTECE AQUI!)
            const ativosDaAba = categorias[tabName];
            buildCards(ativosDaAba, dashboard); // Cria as caixas vazias IMEDIATAMENTE
            
            // Busca Cotações em Lote
            const tickersString = ativosDaAba.map(a => a.ticker).join(',');
            fetch(`${URL_BACKEND}/api/cotacoes-lote?tickers=${tickersString}`)
                .then(r => r.json())
                .then(cotacoesAtuais => {
                    ativosDaAba.forEach(asset => { 
                        if(cotacoesAtuais[asset.ticker]) {
                            updateCardUI(asset.id, cotacoesAtuais[asset.ticker].atual, cotacoesAtuais[asset.ticker].fechamentoAnterior, asset.prefix, asset.decimals); 
                        }
                    });
                }).catch(e => console.log("Lote falhou:", e));

            // CASCATA DE GRÁFICOS (Renderiza um a um sem travar a CPU)
            setTimeout(async () => {
                for (let i = 0; i < ativosDaAba.length; i++) {
                    if (currentTab !== tabName) break;
                    await fetchMiniChart(ativosDaAba[i], tabName);
                    await new Promise(r => setTimeout(r, 50)); // Respiro mágico
                }
            }, 100);
        }

        function clickOrdenar(tipo, coluna) { ordenarDados(tipo, coluna, false); renderizarAbaRanking(); }

        function ordenarDados(tipo, coluna, isInit) {
            let estado = ordemRanking[tipo];
            if (!isInit) {
                if (estado.col === coluna) { estado.dir *= -1; } 
                else { estado.col = coluna; estado.dir = ['pl', 'pegRatio', 'pvp', 'evEbitda', 'dividaPL'].includes(coluna) ? 1 : -1; }
            }
            let lista = tipo === 'br' ? dadosRankingBr : dadosRankingUs;
            lista.sort((a, b) => {
                if (a[coluna] === null || a[coluna] === undefined) return 1;
                if (b[coluna] === null || b[coluna] === undefined) return -1;
                if (a[coluna] < b[coluna]) return -1 * estado.dir;
                if (a[coluna] > b[coluna]) return 1 * estado.dir; return 0;
            });
        }

        function renderizarAbaRanking() {
            const dashboard = document.getElementById('dashboard');
            const fNum = (num) => (num !== null && !isNaN(num)) ? parseFloat(num).toFixed(2) : '-';
            const fPct = (num) => (num !== null && !isNaN(num)) ? (parseFloat(num) * 100).toFixed(2) + '%' : '-';
            const getSeta = (tipo, col) => ordemRanking[tipo].col === col ? (ordemRanking[tipo].dir === 1 ? ' ↑' : ' ↓') : ' ↕';

            const renderTabela = (titulo, lista, tipo) => {
                if (lista.length === 0) return '';
                let html = `<div class="section-title">${titulo}</div><div style="width: 100%; max-width: 1400px; overflow-x: auto; background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 10px; margin-bottom: 40px;"><table class="ranking-table"><thead><tr><th>Ativo</th><th>Status IA</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'dy')">D.Y${getSeta(tipo,'dy')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'pl')">P/L${getSeta(tipo,'pl')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'pegRatio')">PEG Ratio${getSeta(tipo,'pegRatio')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'pvp')">P/VP${getSeta(tipo,'pvp')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'evEbitda')">EV/EBITDA${getSeta(tipo,'evEbitda')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'vpa')">VPA${getSeta(tipo,'vpa')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'dividaPL')">Dív/PL${getSeta(tipo,'dividaPL')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'liquidezCorrente')">Liq. Corr.${getSeta(tipo,'liquidezCorrente')}</th><th style="cursor:pointer;" onclick="clickOrdenar('${tipo}', 'margem')">Margem Líq.${getSeta(tipo,'margem')}</th><th style="cursor:pointer; color: #4CAF50;" onclick="clickOrdenar('${tipo}', 'roe')">ROE${getSeta(tipo,'roe')}</th></tr></thead><tbody>`;
                lista.forEach(item => {
                    let badgeClass = 'status-badge ' + (item.status === 'SUBVALORIZADA' ? 'status-sub' : item.status === 'SUPERVALORIZADA' ? 'status-super' : 'status-justo');
                    html += `<tr style="cursor:pointer;" onclick="abrirDoRanking('${item.ticker}')"><td style="font-weight: 800; color: #2196F3; font-size: 1.1rem;">${item.ticker}</td><td><span class="${badgeClass}">${item.status}</span></td><td>${fPct(item.dy)}</td><td>${fNum(item.pl)}</td><td>${fNum(item.pegRatio)}</td><td>${fNum(item.pvp)}</td><td>${fNum(item.evEbitda)}</td><td>${fNum(item.vpa)}</td><td>${fNum(item.dividaPL)}</td><td>${fNum(item.liquidezCorrente)}</td><td>${fPct(item.margem)}</td><td style="font-weight: bold; color: #4CAF50;">${fPct(item.roe)}</td></tr>`;
                });
                html += `</tbody></table></div>`; return html;
            };

            let telaCompleta = '';
            if (dadosRankingBr.length > 0) telaCompleta += renderTabela('🇧🇷 Ranking Ações Brasil', dadosRankingBr, 'br');
            if (dadosRankingUs.length > 0) telaCompleta += renderTabela('🇺🇸 Ranking Ações Internacionais', dadosRankingUs, 'us');
            dashboard.innerHTML = telaCompleta || '<div class="section-title">Nenhum dado encontrado.</div>';
        }

        async function fetchMiniChart(asset, targetTab) {
            try {
                const resHist = await fetch(`${URL_BACKEND}/api/historico/${asset.ticker}?range=1mo&interval=1d`);
                const histData = await resHist.json();
                if(histData.historico && histData.historico.length > 0 && currentTab === targetTab) { 
                    drawMiniChart(asset.id, histData.historico);
                    
                    // A PORTA DOS FUNDOS (Salva o preço se a cotação falhou)
                    const elPrice = document.getElementById(`price-${asset.id}`);
                    if (elPrice && elPrice.innerText === '---' && histData.historico.length >= 2) {
                        const precos = histData.historico;
                        const pAtual = precos[precos.length-1].close;
                        const pAnt = precos[precos.length-2]?.close || pAtual;
                        updateCardUI(asset.id, parseFloat(pAtual), parseFloat(pAnt), asset.prefix, asset.decimals);
                    }
                }
            } catch (e) { }
        }

        function searchAsset() {
            let ticker = document.getElementById('searchInput').value.trim().toUpperCase();
            if(!ticker) return;
            if(/^[A-Z]{4}\d{1,2}$/.test(ticker)) { ticker += '.SA'; }
            abrirDoRanking(ticker);
        }

        function abrirDoRanking(tickerReal) {
            const ehBrasil = tickerReal.includes('.SA');
            const nomeLimpo = tickerReal.replace('.SA', '');
            const assetObj = { id: 'BUSCA', name: nomeLimpo, ticker: tickerReal, decimals: 2, prefix: ehBrasil ? 'R$' : 'US$' };
            openModal(assetObj);
        }

        async function chamarAnaliseTecnica() {
            const btn = document.getElementById('btn-ia-tech');
            const resultDiv = document.getElementById('tech-result');
            btn.innerHTML = '⏳ Analisando Gráfico...'; 
            btn.disabled = true;
            try {
                const res = await fetch(`${URL_BACKEND}/api/analise-tecnica/${currentAssetObj.ticker}`);
                const data = await res.json();
                if(data.erro) throw new Error(data.erro);
                
                let corTendencia = '#FFC107'; 
                if(data.tendencia && data.tendencia.toUpperCase().includes('ALTA')) corTendencia = '#4CAF50';
                if(data.tendencia && data.tendencia.toUpperCase().includes('BAIXA')) corTendencia = '#c93e36';
                
                btn.style.display = 'none'; 
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div style="color: #9C27B0; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; text-align: center; text-transform: uppercase; letter-spacing: 1px;">🤖 Diagnóstico Gráfico (IA)</div>
                    <div class="tech-grid">
                        <div class="tech-box" style="border-color: ${corTendencia};"><div class="tech-label">Tendência Curto Prazo</div><div class="tech-val" style="color: ${corTendencia};">${data.tendencia || '-'}</div></div>
                        <div class="tech-box"><div class="tech-label">Zona de Suporte</div><div class="tech-val" style="color: #4CAF50;">${currentAssetObj.prefix} ${data.suporte || '-'}</div></div>
                        <div class="tech-box"><div class="tech-label">Zona de Resistência</div><div class="tech-val" style="color: #c93e36;">${currentAssetObj.prefix} ${data.resistencia || '-'}</div></div>

                    <div style="margin-top: 15px; font-size: 0.95rem; color: #ccc; text-align: center; font-style: italic; background: #2a2a2c; padding: 12px; border-radius: 8px;">"${data.comentario || 'Análise concluída.'}"</div>
                `;
            } catch (e) { 
                btn.innerHTML = '❌ Erro. Tentar Novamente';

        function openModal(asset) {
            currentAssetObj = asset;
            document.getElementById('modal-title').innerText = `${asset.name} (${asset.ticker})`;
            document.getElementById('modal').style.display = 'flex';
            
            const btnTech = document.getElementById('btn-ia-tech'); 
            const resultTech = document.getElementById('tech-result');
            
            if (btnTech && resultTech) { 
                btnTech.style.display = 'block'; 
                btnTech.innerHTML = '🎯 Análise Gráfica (IA)'; 
                btnTech.disabled = false; 
                resultTech.style.display = 'none'; 
                resultTech.innerHTML = ''; 
            }
            
            document.querySelector('.timeframe-buttons button:nth-child(3)').click();
            fetchIndicadores(asset.ticker);
        }

        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
        }

        async function loadDetailedData(range, interval, btnElement) {
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            try {
                const response = await fetch(`${URL_BACKEND}/api/historico/${currentAssetObj.ticker}?range=${range}&interval=${interval}`);
                const data = await response.json(); 
                drawDetailedChart(data.historico);
            } catch (error) {}
        }

        function drawMiniChart(id, historicalData) {
            const canvas = document.getElementById(`mini-chart-${id}`); 
            if(!canvas || !historicalData || historicalData.length === 0) return; 
            const ctx = canvas.getContext('2d');
            const color = (historicalData[historicalData.length - 1].close - historicalData[0].close) >= 0 ? '#1a7f37' : '#c93e36'; 
            const gradient = ctx.createLinearGradient(0, 0, 0, 80); 
            gradient.addColorStop(0, color); gradient.addColorStop(1, '#0b0b0c'); 
            
            // ANIMATION FALSE: O GRANDE SEGREDO PARA A CPU NÃO CHORAR
            miniCharts[id] = new Chart(ctx, { 
                type: 'line', 
                data: { labels: historicalData.map(i => i.time), datasets: [{ data: historicalData.map(i => i.close), borderColor: color, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: gradient }] }, 
                options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } } 
            });
        }
        
        function updateCardUI(id, currentPrice, previousPrice, prefix, decimals) {
            const elPrice = document.getElementById(`price-${id}`); const elVar = document.getElementById(`var-${id}`); if(!elPrice || !elVar) return;
            const varValue = currentPrice - previousPrice; const varPct = previousPrice ? (varValue / previousPrice) * 100 : 0;
            elPrice.innerHTML = `${prefix} ${currentPrice.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}`; 
            elVar.innerHTML = varValue >= 0 ? `▲ +${varPct.toFixed(2)}%` : `▼ ${Math.abs(varPct).toFixed(2)}%`; 
            elVar.className = varValue >= 0 ? 'variation up' : 'variation down';
        }

        function drawDetailedChart(historicalData) {
            if(!historicalData || historicalData.length === 0) return;
            const ctx = document.getElementById('modalChartCanvas').getContext('2d');
            const color = (historicalData[historicalData.length - 1].close - historicalData[0].close) >= 0 ? '#1a7f37' : '#c93e36'; 
            if(detailedChartInstance) detailedChartInstance.destroy(); 
            const gradient = ctx.createLinearGradient(0, 0, 0, 400); gradient.addColorStop(0, color); gradient.addColorStop(1, '#0b0b0c');
            detailedChartInstance = new Chart(ctx, { type: 'line', data: { labels: historicalData.map(i => i.time), datasets: [{ data: historicalData.map(i => i.close), borderColor: color, borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: gradient }] }, options: { responsive: true, maintainAspectRatio: false, interaction: { intersect: false, mode: 'index' }, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a1b', titleColor: '#fff', bodyColor: '#fff', borderColor: '#444', borderWidth: 1 } }, scales: { x: { display: false }, y: { display: true, position: 'left', ticks: { color: '#8e9196', callback: function(value) { return currentAssetObj.prefix + ' ' + value.toLocaleString(); } }, grid: { color: '#333336' } } } });
        }

        // START IMEDIATO
        window.addEventListener('DOMContentLoaded', () => {
            switchTab('geral', document.querySelector('.tab-btn'));
        });
        
    </script>
